<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistik Pro Elite</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="app">
        <header id="mainDashboard"></header>

        <div id="searchArea" class="search-container" style="display:none">
            <input type="text" id="searchInput" placeholder="Cari nama sekolah..." oninput="handleSearch()">
        </div>

        <main id="mainContent"></main>

        <div id="undoToast" class="undo-toast">
            <span id="undoMsg">Data dihapus</span>
            <button onclick="executeUndo()">UNDO (5s)</button>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div id="passModal" class="modal-card modal-sm">
            <div class="modal-icon"><i class="fas fa-lock"></i></div>
            <h3>Verifikasi Akses</h3>
            <input type="password" id="passInput" class="premium-input" placeholder="••••" maxlength="4">
            <button class="btn-confirm" id="btnConfirmPass">MASUK</button>
            <button class="btn-cancel" onclick="closeModal()">BATAL</button>
        </div>

        <div id="inputModal" class="modal-card">
            <h3>Tambah Data Sekolah</h3>
            <div class="input-group">
                <label>Nama Sekolah</label>
                <input type="text" id="skNama" class="premium-input" placeholder="Masukkan Nama...">
            </div>
            <div class="input-group">
                <label>Alokasi Mobil</label>
                <select id="skMobil" class="premium-input">
                    <option value="Mobil 1">Mobil 1</option>
                    <option value="Mobil 2">Mobil 2</option>
                </select>
            </div>
            <div class="input-row">
                <div class="input-group"><label>PK</label><input type="number" id="skPK" value="0"></div>
                <div class="input-group"><label>PB</label><input type="number" id="skPB" value="0"></div>
                <div class="input-group"><label>Tendik</label><input type="number" id="skTendik" value="0"></div>
            </div>
            <button class="btn-confirm" onclick="saveSekolah()">SIMPAN DATA</button>
            <button class="btn-cancel" onclick="closeModal()">BATAL</button>
        </div>
    </div>

    <nav class="navbar" id="bottomNav" style="display:none">
        <div class="nav-item" onclick="changePage('home')"><i class="fas fa-home"></i><span>Beranda</span></div>
        <div id="adminAction" class="nav-plus" onclick="openInputModal()">+</div>
        <div class="nav-item" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i><span>Keluar</span></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
