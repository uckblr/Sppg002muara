<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UCKBLR - SPPG MUARA 002</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <p id="loader-text">MENGHUBUNGKAN...</p>
    </div>
    
    <div id="toast">Pesan</div>

    <div id="modal-overlay" class="overlay">
        <div id="login-modal" class="modal" style="text-align:center">
            <h3 style="margin:0 0 15px 0; font-size: 16px;">Akses User</h3>
            <input type="password" id="pin-input" style="width:100%; padding:12px; border-radius:12px; border:2px solid #f1f5f9; text-align:center; font-size:20px; letter-spacing:8px" maxlength="4" inputmode="numeric" oninput="checkPinAuto(this.value)">
            <button onclick="closeModal()" style="background:none; border:none; color:#94a3b8; font-weight:700; margin-top:15px; font-size:11px">BATAL</button>
        </div>

        <div id="form-modal" class="modal">
            <h3 id="modal-title" style="margin-top:0; font-size:16px;">Data Sekolah</h3>
            <input type="text" id="in-nama" style="width:100%; padding:12px; border-radius:10px; border:2px solid #f1f5f9; margin-bottom:10px; font-weight:700" placeholder="Nama Sekolah">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:10px">
                <button id="btn-m1" class="btn-action" onclick="selectMobil('Mobil 1')">MOBIL 1</button>
                <button id="btn-m2" class="btn-action" onclick="selectMobil('Mobil 2')">MOBIL 2</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
                <input type="number" id="in-pk" style="width:100%; padding:12px; border-radius:10px; border:2px solid #f1f5f9; text-align:center" placeholder="PK">
                <input type="number" id="in-pb" style="width:100%; padding:12px; border-radius:10px; border:2px solid #f1f5f9; text-align:center" placeholder="PB">
                <input type="number" id="in-td" style="width:100%; padding:12px; border-radius:10px; border:2px solid #f1f5f9; text-align:center" placeholder="TD">
            </div>
            <button class="btn-action" style="background:var(--grad); color:white" onclick="handleSave()">SIMPAN DATA</button>
            <button class="btn-action" style="background:#f1f5f9; color:#64748b; margin-top: 8px;" onclick="closeModal()">BATAL</button>
        </div>

        <div id="status-modal" class="modal" style="text-align:center">
            <h3 style="font-size:16px; margin-bottom:15px;">Ubah Status Sekolah</h3>
            <button class="btn-action" style="background:var(--warning); color:white" onclick="updateStatusFromMenu('pending')">PENDING</button>
            <button class="btn-action" style="background:var(--success); color:white" onclick="updateStatusFromMenu('done')">SELESAI</button>
            <button class="btn-action" style="background:var(--holiday); color:white" onclick="updateStatusFromMenu('holiday')">LIBUR</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#94a3b8; font-weight:700; margin-top:15px; font-size:11px">BATAL</button>
        </div>

        <div id="confirm-modal" class="modal" style="text-align:center">
            <h3 id="confirm-title" style="font-size:16px; margin-bottom:10px;">Konfirmasi</h3>
            <p id="confirm-msg" style="font-size:13px; color:#64748b; margin-bottom:20px;"></p>
            <div style="display:flex; gap:8px">
                <button class="btn-mini" style="background:#f1f5f9" onclick="closeModal()">TIDAK</button>
                <button id="confirm-btn-ok" class="btn-mini" style="background:var(--primary); color:white">YA</button>
            </div>
        </div>

        <div id="exit-modal" class="modal" style="text-align:center">
            <h3 style="font-size:16px;">Keluar Menu?</h3>
            <div style="display:flex; gap:8px; margin-top:15px">
                <button class="btn-mini" style="background:#f1f5f9" onclick="closeModal()">BATAL</button>
                <button class="btn-mini" style="background:var(--danger); color:white" onclick="confirmExit()">KELUAR</button>
            </div>
        </div>
    </div>

    <div id="page-home" style="display: block;">
        <div class="header"><h1>SPPG MUARA 002</h1><p id="h-status" style="font-size:11px; opacity:0.6; display: flex; align-items: center;">Sinkronisasi...</p></div>
        <div style="padding:20px">
            <button class="btn-action" style="background:white; border:1px solid #e2e8f0; height:60px; margin-bottom:10px" onclick="openLogin('admin')">ADMIN</button>
            <button class="btn-action" style="background:white; border:1px solid #e2e8f0; height:60px; margin-bottom:10px" onclick="openLogin('pemorsian')">DIVISI PEMORSIAN</button>
            <button class="btn-action" style="background:white; border:1px solid #e2e8f0; height:60px; margin-bottom:10px" onclick="openLogin('mobil1')">MOBIL 1</button>
            <button class="btn-action" style="background:white; border:1px solid #e2e8f0; height:60px; margin-bottom:10px" onclick="openLogin('mobil2')">MOBIL 2</button>
        </div>
        <div class="footer-brand"> @UCKBLR </div>
    </div>

    <div id="page-app" style="display: none;">
        <div class="header">
            <h1 id="app-title">TITLE</h1>
            <div class="top-nav">
                <div class="nav-btn" onclick="askExit()">🏠</div>
                <div id="btn-add-wrapper" class="nav-btn" onclick="openFormAdd()" style="display:none">➕</div>
            </div>
        </div>
        
        <div id="stats-container"></div>
        <div id="progress-container" class="progress-section"></div>

        <div class="search-area"><input type="text" id="app-search" class="search-input" placeholder="Cari nama sekolah..." oninput="renderApp()"></div>
        <div id="filter-wrapper" class="filter-tabs">
            <div class="tab active" onclick="setFilter('all', this)">SEMUA</div>
            <div class="tab" onclick="setFilter('Mobil 1', this)">MOBIL 1</div>
            <div class="tab" onclick="setFilter('Mobil 2', this)">MOBIL 2</div>
        </div>
        <div id="list-container"></div>
    </div>

<script type="module" src="app.js"></script>
</body>
</html>
