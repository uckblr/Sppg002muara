<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistik Pro Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="app">
        <header id="mainDashboard">
            <div class="header-loader"></div>
        </header>

        <div id="searchArea" class="search-container" style="display:none">
            <input type="text" id="searchInput" class="premium-input search-box" placeholder="Cari nama sekolah..." oninput="handleSearch()">
        </div>

        <main id="mainContent">
            <div class="loading-state">Memuat Sistem...</div>
        </main>

        <div id="undoToast" class="undo-toast">
            <span id="undoMsg">Data dihapus</span>
            <button class="btn-undo" onclick="executeUndo()">UNDO</button>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div id="passModal" class="modal-card modal-sm" style="display:none">
            <div class="modal-icon">🔐</div>
            <h3>Keamanan</h3>
            <p>Masukkan kode akses 4 digit</p>
            <input type="password" id="passInput" class="premium-input pass-input" placeholder="••••" maxlength="4">
            <button class="btn-gradient" id="btnConfirmPass">VERIFIKASI</button>
            <button class="btn-text" onclick="closeModal()">BATAL</button>
        </div>

        <div id="inputModal" class="modal-card" style="display:none">
            <h3 style="margin-top:0">Tambah Sekolah</h3>
            <div class="input-group">
                <label>NAMA SEKOLAH</label>
                <input type="text" id="skNama" class="premium-input" placeholder="Contoh: SD NEGERI 01">
            </div>
            <div class="input-group">
                <label>ALOKASI MOBIL</label>
                <select id="skMobil" class="premium-input">
                    <option value="Mobil 1">Mobil 1</option>
                    <option value="Mobil 2">Mobil 2</option>
                </select>
            </div>
            <div class="grid-inputs">
                <div class="input-group"><label>PK</label><input type="number" id="skPK" class="premium-input" value="0"></div>
                <div class="input-group"><label>PB</label><input type="number" id="skPB" class="premium-input" value="0"></div>
                <div class="input-group"><label>TDK</label><input type="number" id="skTendik" class="premium-input" value="0"></div>
            </div>
            <button class="btn-gradient" onclick="saveSekolah()">SIMPAN DATA</button>
            <button class="btn-text" onclick="closeModal()">BATAL</button>
        </div>
    </div>

    <nav class="navbar" id="bottomNav" style="display:none">
        <div class="nav-item" onclick="location.reload()">🏠<span>Beranda</span></div>
        <div class="nav-plus" onclick="openInputModal()"><span>+</span></div>
        <div class="nav-item logout" onclick="logout()">🚪<span>Keluar</span></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
