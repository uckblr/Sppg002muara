<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistik Pro Elite v19</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --grad: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --dark: #0f172a;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f8fafc;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--dark); }

        .header { background: var(--dark); color: white; padding: 40px 25px 60px; border-radius: 0 0 40px 40px; position: sticky; top: 0; z-index: 100; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 800; }
        .top-nav { position: absolute; top: 35px; right: 20px; display: flex; gap: 10px; z-index: 110; }
        .nav-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255, 255, 255, 0.1); width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .page { display: none; padding-bottom: 50px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: -30px 20px 10px; position: relative; z-index: 101; }
        .stat-card { background: white; padding: 12px; border-radius: 18px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; text-align: center; }
        .stat-card small { display: block; color: #64748b; font-size: 8px; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; }
        .stat-card b { font-size: 13px; font-weight: 800; }

        .detail-area { background: #fff; margin: 10px 20px; padding: 15px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #f1f5f9; font-size: 12px; font-weight: 700; }

        .progress-area { margin: 15px 20px; }
        .pb-bg { height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .pb-fill { height: 100%; background: var(--grad); width: 0%; transition: 0.5s; }

        .filter-row { display: flex; gap: 8px; margin: 15px 20px; }
        .btn-filter { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; font-weight: 700; font-size: 10px; color: #64748b; cursor: pointer; }
        .btn-filter.active { background: var(--dark); color: white; border-color: var(--dark); }

        .card { background: white; border-radius: 22px; padding: 20px; margin: 12px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; position: relative; }
        .badge { padding: 4px 8px; background: #f1f5f9; border-radius: 8px; font-size: 10px; font-weight: 700; margin-right: 4px; }
        .btn-action { border: none; border-radius: 12px; font-weight: 700; cursor: pointer; padding: 12px; font-size: 11px; width: 100%; margin-top: 10px; }

        .overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal { background: white; padding: 25px; border-radius: 30px; width: 100%; max-width: 400px; }
        .input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; background: #f8fafc; font-family: inherit; margin-bottom: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="modal-overlay" class="overlay">
        <div id="login-modal" class="modal" style="display:none; text-align:center">
            <h3>🔑 Masukkan PIN</h3>
            <input type="password" id="pin-input" class="input" style="text-align:center; letter-spacing:10px; font-size:24px" maxlength="4">
            <button class="btn-action" style="background:var(--grad); color:white" onclick="verifyLogin()">MASUK</button>
            <button onclick="closeModal()" style="background:none; border:none; margin-top:10px; color:#94a3b8">BATAL</button>
        </div>

        <div id="form-modal" class="modal" style="display:none">
            <h3 id="modal-title">Sekolah</h3>
            <input type="text" id="in-nama" class="input" placeholder="Nama Sekolah">
            <select id="in-mobil" class="input">
                <option value="Mobil 1">Mobil 1</option>
                <option value="Mobil 2">Mobil 2</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px">
                <input type="number" id="in-pk" class="input" placeholder="PK">
                <input type="number" id="in-pb" class="input" placeholder="PB">
                <input type="number" id="in-td" class="input" placeholder="Tendik">
            </div>
            <button class="btn-action" style="background:var(--grad); color:white" onclick="handleSave()">SIMPAN DATA</button>
            <button onclick="closeModal()" style="background:none; border:none; width:100%; margin-top:10px; color:#94a3b8">TUTUP</button>
        </div>
    </div>

    <div id="page-home" class="page active">
        <div class="header"><h1>Logistik Control</h1><p id="h-status" style="font-size:12px; opacity:0.6">Menghubungkan...</p></div>
        <div style="padding:40px 25px">
            <button class="btn-filter" style="width:100%; padding:20px; margin-bottom:12px; font-size:14px" onclick="openLogin('admin')">💼 Admin Kantor</button>
            <button class="btn-filter" style="width:100%; padding:20px; margin-bottom:12px; font-size:14px" onclick="openLogin('pemorsian')">🍳 Tim Pemorsian</button>
            <button class="btn-filter" style="width:100%; padding:20px; margin-bottom:12px; font-size:14px" onclick="openLogin('mobil1')">🚚 Supir Mobil 1</button>
            <button class="btn-filter" style="width:100%; padding:20px; margin-bottom:12px; font-size:14px" onclick="openLogin('mobil2')">🚚 Supir Mobil 2</button>
        </div>
    </div>

    <div id="page-admin" class="page">
        <div class="header"><h1>Admin Panel</h1><div class="top-nav"><div class="nav-btn" onclick="location.reload()">🏠</div><div class="nav-btn" onclick="openFormAdd()">➕</div></div></div>
        <div class="stats-grid"><div class="stat-card"><small>TOTAL</small><b id="adm-t">0</b></div><div class="stat-card"><small>DONE</small><b id="adm-d" style="color:var(--success)">0</b></div><div class="stat-card"><small>PENDING</small><b id="adm-p" style="color:var(--danger)">0</b></div></div>
        <div class="detail-area"><div class="detail-row"><span>TOTAL PK</span><b id="adm-pk">0</b></div><div class="detail-row" style="border:none"><span>TOTAL PB</span><b id="adm-pb">0</b></div></div>
        <div class="progress-area"><div style="display:flex; justify-content:space-between; font-size:11px; font-weight:800; margin-bottom:5px"><span id="adm-c">0/0 Sekolah</span><span id="adm-pct">0%</span></div><div class="pb-bg"><div id="adm-bar" class="pb-fill"></div></div></div>
        <div class="filter-row"><button class="btn-filter active" onclick="setFilterAdm('all')">SEMUA</button><button class="btn-filter" onclick="setFilterAdm('Mobil 1')">M1</button><button class="btn-filter" onclick="setFilterAdm('Mobil 2')">M2</button></div>
        <div style="margin:0 20px 10px"><input type="text" id="adm-search" class="btn-filter" style="width:100%; text-align:left; color:black" placeholder="Cari sekolah..." oninput="renderAdmin()"></div>
        <div id="list-admin"></div>
    </div>

    <div id="page-pemorsian" class="page">
        <div class="header"><h1>Pemorsian</h1><div class="top-nav"><div class="nav-btn" onclick="location.reload()">🏠</div></div></div>
        <div class="stats-grid"><div class="stat-card"><small>TARGET</small><b id="p-t">0</b></div><div class="stat-card"><small>READY</small><b id="p-r" style="color:var(--success)">0</b></div><div class="stat-card"><small>ANTRE</small><b id="p-p" style="color:var(--danger)">0</b></div></div>
        <div class="detail-area"><div class="detail-row"><span>TOTAL PK</span><span id="dpk">0 Ikat</span></div><div class="detail-row" style="border:none"><span>TOTAL PB</span><span id="dpb">0 Ikat</span></div></div>
        <div class="progress-area"><div style="display:flex; justify-content:space-between; font-size:11px; font-weight:800; margin-bottom:5px"><span id="pc">0/0 Selesai</span><span id="ppct">0%</span></div><div class="pb-bg"><div id="pbar" class="pb-fill"></div></div></div>
        <div class="filter-row"><button class="btn-filter active" onclick="setFilterP('all')">SEMUA</button><button class="btn-filter" onclick="setFilterP('Mobil 1')">M1</button><button class="btn-filter" onclick="setFilterP('Mobil 2')">M2</button></div>
        <div id="list-pemorsian"></div>
    </div>

    <div id="page-mobil" class="page">
        <div class="header"><h1 id="mb-head">Mobil</h1><div class="top-nav"><div class="nav-btn" onclick="location.reload()">🏠</div></div></div>
        <div id="list-mobil" style="margin-top:20px"></div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxKTFPwPDoh-wNDPnkde0IqxiLGGLux_rPSBQaVCy0kbtaXPWkOE7RWoW8IgWXD2s0v/exec";
        const PINS = { admin:"1111", pemorsian:"2222", mobil1:"3331", mobil2:"3332" };
        let schools = [], currentRole = "", filterAdm = "all", filterP = "all", currentMobil = "", editIndex = null;

        async function fetchSchools() {
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                schools = data.map(s => ({
                    ...s, pk: parseInt(s.pk)||0, pb: parseInt(s.pb)||0, tendik: parseInt(s.tendik)||0,
                    status: String(s.status||"pending").trim().toLowerCase(),
                    islibur: String(s.islibur).trim().toUpperCase() === "TRUE"
                }));
                document.getElementById('h-status').innerText = "Online";
                renderAll();
            } catch(e) { document.getElementById('h-status').innerText = "Offline"; }
        }

        function renderAdmin() {
            const list = document.getElementById('list-admin');
            const search = document.getElementById('adm-search').value.toUpperCase();
            list.innerHTML = "";
            let t=0, d=0, pk=0, pb=0, ts=0, ds=0;

            schools.forEach((s, i) => {
                if(!s.islibur) {
                    const tot = s.pk+s.pb+s.tendik; t+=tot; pk+=s.pk; pb+=s.pb; ts++;
                    if(s.status === 'done') { d+=tot; ds++; }
                }
                if(s.nama.includes(search) && (filterAdm==='all' || s.mobil===filterAdm)) {
                    list.innerHTML += `
                    <div class="card" style="${s.islibur?'opacity:0.5':''}">
                        <div style="display:flex; justify-content:space-between">
                            <h3 style="font-size:14px; margin:0">${s.nama}</h3>
                            <button style="border:none; background:none" onclick="openFormEdit(${i})">📝</button>
                        </div>
                        <div style="margin:10px 0"><span class="badge">PK: ${s.pk}</span><span class="badge">PB: ${s.pb}</span><span class="badge">T: ${s.tendik}</span><span class="badge">${s.mobil}</span></div>
                        <div style="display:flex; gap:5px">
                            <button class="btn-action" style="margin:0; background:#f1f5f9" onclick="updateLibur(${i})">${s.islibur?'AKTIFKAN':'LIBUR'}</button>
                            <button class="btn-action" style="margin:0; background:#fee2e2; color:var(--danger)" onclick="hapusSekolah('${s.id}')">HAPUS</button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('adm-t').innerText=t; document.getElementById('adm-d').innerText=d; document.getElementById('adm-p').innerText=t-d;
            document.getElementById('adm-pk').innerText=pk; document.getElementById('adm-pb').innerText=pb;
            document.getElementById('adm-c').innerText=`${ds}/${ts} Selesai`;
            let pct = ts>0?Math.round((ds/ts)*100):0;
            document.getElementById('adm-pct').innerText=pct+"%"; document.getElementById('adm-bar').style.width=pct+"%";
        }

        function renderPemorsian() {
            const list = document.getElementById('list-pemorsian'); list.innerHTML = "";
            let t=0, r=0, ts=0, ds=0, pkI=0, pbI=0, pkS=[], pbS=[];

            const sorted = [...schools].filter(s => !s.islibur).sort((a,b) => (a.status==='pending'? -1 : 1));

            sorted.forEach(s => {
                const tot = s.pk+s.pb+s.tendik; t+=tot; ts++;
                if(s.status !== 'pending') { r+=tot; ds++; }
                else {
                    pkI += Math.floor(s.pk/5); pbI += Math.floor(s.pb/5);
                    if(s.pk%5>0) pkS.push("+"+(s.pk%5)); if(s.pb%5>0) pbS.push("+"+(s.pb%5));
                }

                if(filterP==='all' || s.mobil===filterP) {
                    const isD = s.status !== 'pending';
                    list.innerHTML += `
                    <div class="card" style="${isD?'opacity:0.6; background:#f8fafc':''}">
                        <div style="display:flex; justify-content:space-between"><h3>${s.nama}</h3><span class="badge">Total: ${tot}</span></div>
                        <div style="border-left:4px solid ${isD?'#ccc':'var(--primary)'}; padding-left:12px; margin:10px 0">
                            <p style="margin:2px 0">PK: ${Math.floor(s.pk/5)} I + ${s.pk%5}</p>
                            <p style="margin:2px 0">PB: ${Math.floor(s.pb/5)} I + ${s.pb%5}</p>
                        </div>
                        <button class="btn-action" style="background:${isD?'#f1f5f9':'var(--success)'}; color:${isD?'#64748b':'white'}" 
                        onclick="updateStatus('${s.id}', '${isD?'pending':'ready'}')">${isD?'↩️ UNDO':'✅ KONFIRMASI'}</button>
                    </div>`;
                }
            });
            document.getElementById('p-t').innerText=t; document.getElementById('p-r').innerText=r; document.getElementById('p-p').innerText=t-r;
            document.getElementById('dpk').innerText=`${pkI} Ikat ${pkS.join("")}`; document.getElementById('dpb').innerText=`${pbI} Ikat ${pbS.join("")}`;
            let pct = ts>0?Math.round((ds/ts)*100):0;
            document.getElementById('pc').innerText=`${ds}/${ts} Sekolah`;
            document.getElementById('ppct').innerText=pct+"%"; document.getElementById('pbar').style.width=pct+"%";
        }

        // FUNGSI PENDUKUNG
        async function updateStatus(id, stat) {
            const s = schools.find(x=>x.id===id); if(s){ s.status=stat; renderAll(); }
            await fetch(WEB_APP_URL, {method:"POST", body:JSON.stringify({action:"update", id, status:stat})});
        }
        async function updateLibur(i) {
            const s = schools[i]; s.islibur=!s.islibur; renderAll();
            await fetch(WEB_APP_URL,{method:"POST", body:JSON.stringify({action:"update", id:s.id, islibur:s.islibur})});
        }
        async function hapusSekolah(id) {
            if(!confirm("Hapus?")) return; schools=schools.filter(s=>s.id!==id); renderAll();
            await fetch(WEB_APP_URL,{method:"POST", body:JSON.stringify({action:"delete", id})});
        }
        function openFormAdd() { editIndex=null; document.getElementById('modal-title').innerText="Tambah Sekolah"; document.querySelectorAll('.input').forEach(i=>i.value=""); document.getElementById('modal-overlay').style.display='flex'; document.getElementById('form-modal').style.display='block'; }
        function openFormEdit(i) { editIndex=i; const s=schools[i]; document.getElementById('modal-title').innerText="Edit Sekolah"; document.getElementById('in-nama').value=s.nama; document.getElementById('in-mobil').value=s.mobil; document.getElementById('in-pk').value=s.pk; document.getElementById('in-pb').value=s.pb; document.getElementById('in-td').value=s.tendik; document.getElementById('modal-overlay').style.display='flex'; document.getElementById('form-modal').style.display='block'; }
        async function handleSave() {
            const n=document.getElementById('in-nama').value, m=document.getElementById('in-mobil').value, pk=parseInt(document.getElementById('in-pk').value)||0, pb=parseInt(document.getElementById('in-pb').value)||0, td=parseInt(document.getElementById('in-td').value)||0;
            const id = editIndex!==null?schools[editIndex].id:Date.now().toString();
            if(editIndex!==null) schools[editIndex]={...schools[editIndex], nama:n, mobil:m, pk, pb, tendik:td};
            else schools.push({id, nama:n, mobil:m, pk, pb, tendik:td, status:'pending', islibur:false});
            renderAll(); closeModal();
            await fetch(WEB_APP_URL,{method:"POST", body:JSON.stringify({action:editIndex!==null?"editData":"addData", id, nama:n, mobil:m, pk, pb, tendik:td})});
        }
        function openLogin(r) { currentRole=r; document.getElementById('modal-overlay').style.display='flex'; document.getElementById('login-modal').style.display='block'; }
        function closeModal() { document.getElementById('modal-overlay').style.display='none'; document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
        function verifyLogin() {
            if(document.getElementById('pin-input').value === PINS[currentRole]) {
                closeModal(); navigate(currentRole==='admin'?'admin':(currentRole==='pemorsian'?'pemorsian':'mobil'));
                if(currentRole.includes('mobil')) { currentMobil=currentRole==='mobil1'?'Mobil 1':'Mobil 2'; document.getElementById('mb-head').innerText=currentMobil; renderMobil(); }
            } else alert("PIN Salah");
            document.getElementById('pin-input').value="";
        }
        function navigate(p) { document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); }
        function setFilterAdm(m) { filterAdm=m; event.target.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); renderAdmin(); }
        function setFilterP(m) { filterP=m; event.target.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); renderPemorsian(); }
        function renderMobil() {
            const list = document.getElementById('list-mobil'); list.innerHTML = "";
            schools.filter(s => s.mobil === currentMobil && !s.islibur).forEach(s => {
                const isR = s.status === 'ready', isD = s.status === 'done';
                list.innerHTML += `<div class="card"><h3>${s.nama}</h3><button class="btn-action" style="color:white; background:${isD?'#10b981':(isR?'#4f46e5':'#ccc')}" ${!isR||isD?'disabled':''} onclick="updateStatus('${s.id}','done')">${isD?'TERKIRIM':(isR?'KONFIRMASI TIBA':'MENUNGGU')}</button></div>`;
            });
        }
        function renderAll() { renderAdmin(); renderPemorsian(); renderMobil(); }
        window.onload = fetchSchools;
    </script>
</body>
</html>
