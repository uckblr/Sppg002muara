<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Logistik Distribusi v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<body>
    <div class="container">
        <div id="statsArea"></div>

        <div id="listContainer" class="list-container"></div>
    </div>

    <div id="inputModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Input Data Sekolah</h3>
            <input type="text" id="sekolahNama" placeholder="Nama Sekolah">
            <select id="mobilPilih">
                <option value="Mobil 1">Mobil 1</option>
                <option value="Mobil 2">Mobil 2</option>
            </select>
            <div class="input-grid">
                <div><label>PK (Ikat)</label><input type="number" id="pki" value="0"></div>
                <div><label>PK (Sisa)</label><input type="number" id="pks" value="0"></div>
                <div><label>PB (Ikat)</label><input type="number" id="pbi" value="0"></div>
                <div><label>PB (Sisa)</label><input type="number" id="pbs" value="0"></div>
            </div>
            <button class="btn-role admin" onclick="tambahData()">Simpan ke Cloud</button>
            <button class="btn-cancel" onclick="tutupModal()">Batal</button>
        </div>
    </div>

    <nav class="navbar" id="mainNav" style="display:none">
        <div class="nav-item active" onclick="location.reload()">🏠<span>Daftar</span></div>
        <div id="plusButton" class="nav-plus" onclick="bukaModal()" style="display:none">+</div>
        <div class="nav-item" onclick="logout()">🚪<span>Keluar</span></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
