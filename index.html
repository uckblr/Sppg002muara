<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistik Control Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --p-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --dark: #0f172a;
            --body-bg: #f8fafc;
            --text-main: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; background: var(--body-bg); color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px;
        }

        /* HEADER PREMIUM */
        header {
            background: var(--dark); color: white; padding: 40px 25px 50px;
            border-radius: 0 0 40px 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        header h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        header p { margin: 5px 0 0; opacity: 0.6; font-size: 14px; }

        /* TOMBOL MENU SEPERTI DI GAMBAR ANDA */
        .role-container { padding: 25px 20px; display: flex; flex-direction: column; gap: 15px; }

        .btn-role {
            background: white; padding: 20px 24px; border-radius: 24px; 
            border: 1px solid #f1f5f9; display: flex; align-items: center; 
            gap: 18px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); transition: 0.2s;
        }
        .btn-role:active { transform: scale(0.96); background: #f1f5f9; }

        .role-icon {
            font-size: 24px; width: 52px; height: 52px; background: #f8fafc;
            display: flex; align-items: center; justify-content: center; border-radius: 16px;
            border: 1px solid #f1f5f9;
        }

        /* MODAL PIN KEAMANAN */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px); display: none; align-items: center; 
            justify-content: center; z-index: 9999; padding: 20px;
        }
        .modal-card { 
            background: white; border-radius: 35px; padding: 32px; 
            width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .premium-input {
            width: 100%; padding: 18px; border-radius: 20px; border: 2px solid #f1f5f9;
            background: #f8fafc; font-size: 18px; margin-bottom: 20px; outline: none;
            text-align: center; font-weight: 800; letter-spacing: 10px;
        }
        .premium-input:focus { border-color: #4f46e5; background: white; }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: var(--dark); color: white; font-weight: 800; 
            cursor: pointer; font-size: 16px; text-transform: uppercase;
        }

        /* NAVBAR BAWAH */
        .navbar {
            position: fixed; bottom: 25px; left: 20px; right: 20px;
            background: var(--dark); height: 75px; border-radius: 25px;
            display: none; align-items: center; justify-content: space-around;
            z-index: 1000;
        }
        .nav-item { color: #94a3b8; text-align: center; cursor: pointer; }
        .nav-item span { display: block; font-size: 10px; margin-top: 4px; font-weight: 600; }
        .nav-plus {
            width: 60px; height: 60px; background: var(--p-gradient); color: white;
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin-top: -55px; border: 5px solid var(--body-bg);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <h1 id="mainTitle">Logistik Control</h1>
            <p id="subTitle">Pilih akses untuk memulai</p>
        </header>

        <main id="mainContent">
            </main>

        <nav class="navbar" id="bottomNav">
            <div class="nav-item" onclick="location.reload()">🏠<span>Home</span></div>
            <div class="nav-plus" onclick="alert('Tambah Data (Admin)')"><span>+</span></div>
            <div class="nav-item" onclick="location.reload()" style="color:#f43f5e">🚪<span>Keluar</span></div>
        </nav>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin:0 0 5px 0">Keamanan</h3>
            <p style="color:#64748b; font-size:14px; margin-bottom:20px">Masukkan kode akses untuk melanjutkan</p>
            <input type="password" id="passInput" class="premium-input" placeholder="••••" maxlength="4">
            <button class="btn-action" onclick="verifyPin()">MASUK</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#94a3b8; margin-top:15px; font-weight:700; cursor:pointer">BATAL</button>
        </div>
    </div>

    <script>
        const PIN_SISTEM = { admin: "1111", dapur: "2222", supir1: "3331", supir2: "3332" };
        let currentTarget = "";

        // Tampilkan Menu Pilihan Awal
        function renderMenu() {
            const content = document.getElementById("mainContent");
            content.innerHTML = `
                <div class="role-container">
                    <div class="btn-role" onclick="openLogin('admin')"><div class="role-icon">💼</div>Admin Kantor</div>
                    <div class="btn-role" onclick="openLogin('dapur')"><div class="role-icon">🍳</div>Tim Pemorsian</div>
                    <div class="btn-role" onclick="openLogin('supir1')"><div class="role-icon">🚚</div>Supir Mobil 1</div>
                    <div class="btn-role" onclick="openLogin('supir2')"><div class="role-icon">🚚</div>Supir Mobil 2</div>
                </div>`;
        }

        function openLogin(role) {
            currentTarget = role;
            document.getElementById("modalOverlay").style.display = "flex";
            document.getElementById("passInput").value = "";
            document.getElementById("passInput").focus();
        }

        function verifyPin() {
            const input = document.getElementById("passInput").value;
            if (input === PIN_SISTEM[currentTarget]) {
                document.getElementById("modalOverlay").style.display = "none";
                document.getElementById("mainTitle").innerText = "Dashboard";
                document.getElementById("subTitle").innerText = "Sistem Berhasil Terhubung";
                document.getElementById("mainContent").innerHTML = `<div style="padding:40px; text-align:center; opacity:0.5">Memuat Data Sekolah...</div>`;
                document.getElementById("bottomNav").style.display = "flex";
            } else {
                alert("PIN Salah!");
            }
        }

        function closeModal() {
            document.getElementById("modalOverlay").style.display = "none";
        }

        // Jalankan saat startup
        renderMenu();
    </script>
</body>
</html>
