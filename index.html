<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistik App Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="headerArea"></div>

        <div id="mainContent"></div>
    </div>

    <div id="inputModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; text-align:center;">Input Data Baru</h3>
            <div class="input-group">
                <label>Nama Sekolah</label>
                <input type="text" id="sekolahNama" placeholder="Masukkan nama sekolah...">
            </div>
            <div class="input-group">
                <label>Pilih Mobil</label>
                <select id="mobilPilih">
                    <option value="Mobil 1">Mobil 1</option>
                    <option value="Mobil 2">Mobil 2</option>
                </select>
            </div>
            <div class="input-grid">
                <div><label>PK Ikat</label><input type="number" id="pki" value="0"></div>
                <div><label>PK Sisa</label><input type="number" id="pks" value="0"></div>
                <div><label>PB Ikat</label><input type="number" id="pbi" value="0"></div>
                <div><label>PB Sisa</label><input type="number" id="pbs" value="0"></div>
            </div>
            <button class="btn-role admin" style="margin-top:20px" onclick="tambahData()">Simpan ke Cloud</button>
            <button class="btn-cancel" onclick="tutupModal()">Batal</button>
        </div>
    </div>

    <nav class="navbar" id="bottomNav" style="display:none">
        <div class="nav-item" onclick="location.reload()">🏠<span>Beranda</span></div>
        <div id="btnPlusAdmin" class="nav-plus" onclick="bukaModal()" style="display:none">+</div>
        <div class="nav-item" onclick="logout()" style="color:#ef4444">🚪<span>Keluar</span></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
