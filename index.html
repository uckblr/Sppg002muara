<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistik Control Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="app">
        <header id="mainDashboard">
            <h1 style="font-weight:800; margin:0; letter-spacing:-1px;">Logistik Control</h1>
            <p style="opacity:0.6; margin-top:5px;">Memuat data sistem...</p>
        </header>

        <div id="searchArea" class="search-container" style="display:none">
            <input type="text" id="searchInput" class="premium-input" placeholder="Cari nama posyandu/sekolah..." oninput="handleSearch()">
        </div>

        <main id="mainContent">
            <div class="loading-state">Menghubungkan ke server...</div>
        </main>

        <div id="undoToast" class="undo-toast">
            <span>Data dihapus</span>
            <button onclick="executeUndo()">UNDO</button>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div id="passModal" class="modal-card" style="display:none">
            <div class="modal-icon">🔐</div>
            <h3>Keamanan</h3>
            <p>Masukkan kode akses 4 digit</p>
            <input type="password" id="passInput" class="premium-input pass-input" placeholder="••••" maxlength="4">
            <button class="btn-action" id="btnConfirmPass">VERIFIKASI</button>
            <button class="btn-text" onclick="closeModal()">BATAL</button>
        </div>
    </div>

    <nav class="navbar" id="bottomNav" style="display:none">
        <div class="nav-item" onclick="location.reload()">🏠<span>Beranda</span></div>
        <div class="nav-plus" onclick="openInputModal()"><span>+</span></div>
        <div class="nav-item logout" onclick="logout()">🚪<span>Keluar</span></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
