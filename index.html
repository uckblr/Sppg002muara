<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logistik Pro Elite v15</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --grad: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --dark: #0f172a;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--dark); overflow-x: hidden; }

        .header { background: var(--dark); color: white; padding: 40px 25px 60px; border-radius: 0 0 40px 40px; position: sticky; top: 0; z-index: 100; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 800; max-width: 65%; line-height: 1.2; }
        
        .top-nav { position: absolute; top: 35px; right: 20px; display: flex; gap: 10px; z-index: 110; }
        .nav-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255, 255, 255, 0.1); width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .page { display: none; padding-bottom: 50px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* DASHBOARD STYLE */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: -30px 20px 10px; position: relative; z-index: 101; }
        .stat-card { background: white; padding: 12px; border-radius: 18px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; text-align: center; }
        .stat-card small { display: block; color: #64748b; font-size: 8px; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; }
        .stat-card b { font-size: 13px; font-weight: 800; color: var(--dark); }

        .detail-area { background: #fff; margin: 10px 20px; padding: 15px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .detail-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #f1f5f9; font-size: 12px; font-weight: 700; }

        .progress-area { margin: 15px 20px; }
        .pb-bg { height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .pb-fill { height: 100%; background: var(--grad); width: 0%; transition: 0.5s; }

        .filter-row { display: flex; gap: 8px; margin: 15px 20px; }
        .btn-filter { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; font-weight: 700; font-size: 10px; color: #64748b; cursor: pointer; }
        .btn-filter.active { background: var(--dark); color: white; border-color: var(--dark); }

        .card { background: white; border-radius: 22px; padding: 20px; margin: 12px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .btn-action { border: none; border-radius: 12px; font-weight: 700; cursor: pointer; padding: 12px; font-size: 11px; display: flex; align-items: center; justify-content: center; width: 100%; }
        
        .badge-p { background: #f1f5f9; padding: 2px 8px; border-radius: 6px; font-size: 10px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="header"><h1>Logistik Control</h1><p id="h-status" style="opacity:0.6; font-size:12px">Menghubungkan...</p></div>
        <div style="padding:40px 25px">
            <button class="btn-filter" style="width:100%; padding:22px; margin-bottom:15px; font-size:15px" onclick="openLogin('admin')">💼 Admin Kantor</button>
            <button class="btn-filter" style="width:100%; padding:22px; margin-bottom:15px; font-size:15px" onclick="openLogin('pemorsian')">🍳 Tim Pemorsian</button>
            <button class="btn-filter" style="width:100%; padding:22px; margin-bottom:15px; font-size:15px" onclick="openLogin('mobil1')">🚚 Supir Mobil 1</button>
            <button class="btn-filter" style="width:100%; padding:22px; margin-bottom:15px; font-size:15px" onclick="openLogin('mobil2')">🚚 Supir Mobil 2</button>
        </div>
    </div>

    <div id="page-pemorsian" class="page">
        <div class="header">
            <h1>Pemorsian</h1><p style="opacity:0.6; font-size:12px">Dashboard Produksi</p>
            <div class="top-nav"><div class="nav-btn" onclick="location.reload()">🏠</div></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><small>TOTAL TARGET</small><b id="p-total-all">0</b></div>
            <div class="stat-card"><small>SIAP/DONE</small><b id="p-total-ready" style="color:var(--success)">0</b></div>
            <div class="stat-card"><small>SISA ANTRE</small><b id="p-total-pending" style="color:var(--danger)">0</b></div>
        </div>

        <div class="detail-area">
            <div class="detail-row"><span>TOTAL PK</span><span id="det-pk">0 Ikat + 0</span></div>
            <div class="detail-row"><span>TOTAL PB</span><span id="det-pb">0 Ikat + 0</span></div>
            <div class="detail-row" style="border:none"><span>TOTAL TENDIK</span><span id="det-td">0 Porsi</span></div>
        </div>

        <div class="progress-area">
            <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:800; margin-bottom:5px">
                <span id="p-count-text">0/0 Sekolah</span><span id="p-percent">0%</span>
            </div>
            <div class="pb-bg"><div id="p-pb" class="pb-fill"></div></div>
        </div>

        <div class="filter-row">
            <button class="btn-filter active" id="pf-all" onclick="setFilterP('all')">SEMUA</button>
            <button class="btn-filter" id="pf-m1" onclick="setFilterP('Mobil 1')">MOBIL 1</button>
            <button class="btn-filter" id="pf-m2" onclick="setFilterP('Mobil 2')">MOBIL 2</button>
        </div>

        <div style="margin:0 20px 15px"><input type="text" id="p-search" placeholder="Cari nama sekolah..." class="btn-filter" style="width:100%; text-align:left; padding-left:15px; color:black" oninput="renderPemorsian()"></div>

        <div id="list-pemorsian"></div>
    </div>

    <div id="page-admin" class="page">
        <div class="header"><h1>Admin Panel</h1><div class="top-nav"><div class="nav-btn" onclick="location.reload()">🏠</div></div></div>
        <div id="list-admin" style="margin-top:20px"></div>
    </div>
    
    <div id="page-mobil" class="page">
        <div class="header"><h1 id="mb-head">Mobil</h1><div class="top-nav"><div class="nav-btn" onclick="location.reload()">🏠</div></div></div>
        <div id="list-mobil" style="margin-top:20px"></div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxKTFPwPDoh-wNDPnkde0IqxiLGGLux_rPSBQaVCy0kbtaXPWkOE7RWoW8IgWXD2s0v/exec";
        const PINS = { admin:"1111", pemorsian:"2222", mobil1:"3331", mobil2:"3332" };
        let schools = [];
        let currentRole = "", currentMobil = "", filterP = "all";

        async function fetchSchools() {
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                schools = data.map(s => ({
                    ...s, pk: parseInt(s.pk)||0, pb: parseInt(s.pb)||0, tendik: parseInt(s.tendik)||0,
                    status: String(s.status||"pending").trim().toLowerCase(),
                    islibur: String(s.islibur).trim().toUpperCase() === "TRUE"
                }));
                document.getElementById('h-status').innerText = "Koneksi Stabil";
                renderAll();
            } catch(e) { document.getElementById('h-status').innerText = "Offline Mode"; }
        }

        function renderPemorsian() {
            const list = document.getElementById('list-pemorsian');
            const search = document.getElementById('p-search').value.toUpperCase();
            list.innerHTML = "";
            
            // Variabel Hitung Dashboard
            let tTotal=0, tReady=0, tPend=0, tPK=0, tPB=0, tTD=0;
            let tS=0, dS=0; // Sekolah

            schools.forEach(s => {
                if(s.islibur) return;

                tS++;
                const porsiSekolah = s.pk + s.pb + s.tendik;
                tTotal += porsiSekolah;

                if(s.status !== 'pending') {
                    tReady += porsiSekolah;
                    dS++;
                } else {
                    tPend += porsiSekolah;
                    // Hanya hitung akumulasi detail untuk yang BELUM dikirim agar dapur fokus pada sisa kerja
                    tPK += s.pk; tPB += s.pb; tTD += s.tendik;
                }

                // Render Card (Hanya yang pending & sesuai filter)
                if(s.status === 'pending' && s.nama.includes(search) && (filterP === 'all' || s.mobil === filterP)) {
                    const pkI = Math.floor(s.pk/5), pkS = s.pk%5;
                    const pbI = Math.floor(s.pb/5), pbS = s.pb%5;

                    list.innerHTML += `<div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:start">
                            <h3>${s.nama}</h3>
                            <span class="badge-p">${s.mobil}</span>
                        </div>
                        <div style="margin: 15px 0; border-left:4px solid var(--primary); padding-left:12px">
                            <p style="margin:4px 0; font-size:14px; font-weight:800">PK: <span style="color:var(--primary)">${pkI} IKAT + ${pkS}</span></p>
                            <p style="margin:4px 0; font-size:14px; font-weight:800">PB: <span style="color:var(--primary)">${pbI} IKAT + ${pbS}</span></p>
                            <p style="margin:4px 0; font-size:11px; opacity:0.6">Tendik: ${s.tendik}</p>
                        </div>
                        <button class="btn-action" style="background:var(--success); color:white" onclick="updateStatus('${s.id}','ready')">SIAP KIRIM</button>
                    </div>`;
                }
            });

            // Update Dashboard Atas
            document.getElementById('p-total-all').innerText = tTotal;
            document.getElementById('p-total-ready').innerText = tReady;
            document.getElementById('p-total-pending').innerText = tPend;

            // Rincian Akumulasi (Sisa tetap dijumlahkan tanpa dijadikan ikat baru)
            document.getElementById('det-pk').innerText = `${Math.floor(tPK/5)} Ikat + ${tPK%5}`;
            document.getElementById('det-pb').innerText = `${Math.floor(tPB/5)} Ikat + ${tPB%5}`;
            document.getElementById('det-td').innerText = `${tTD} Porsi`;

            // Progress Bar
            document.getElementById('p-count-text').innerText = `${dS}/${tS} Sekolah`;
            let pct = tS>0 ? Math.round((dS/tS)*100) : 0;
            document.getElementById('p-percent').innerText = pct + "%";
            document.getElementById('p-pb').style.width = pct + "%";
        }

        function setFilterP(m) {
            filterP = m;
            document.querySelectorAll('#page-pemorsian .btn-filter').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderPemorsian();
        }

        // --- Fungsi Pendukung Sama Dengan Sebelumnya ---
        async function updateStatus(id, stat) {
            const s = schools.find(x => x.id === id);
            if(s) { s.status = stat; renderAll(); }
            await fetch(WEB_APP_URL, {method:"POST", body:JSON.stringify({action:"update", id, status:stat})});
        }

        function openLogin(r) { currentRole = r; document.getElementById('page-home').style.display='none'; verifyLoginDirect(); }
        
        function verifyLoginDirect() {
            // Untuk simulasi cepat, langsung arahkan (nanti bisa tambah modal PIN lagi)
            if(currentRole === 'admin') navigate('admin');
            else if(currentRole === 'pemorsian') navigate('pemorsian');
            else { currentMobil = (currentRole === 'mobil1') ? 'Mobil 1' : 'Mobil 2'; document.getElementById('mb-head').innerText = currentMobil; navigate('mobil'); }
        }

        function navigate(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
        }

        function renderAdmin() { /* Implementasi render admin sama seperti v14 */ }
        function renderMobil() { /* Implementasi render mobil sama seperti v14 */ }
        function renderAll() { renderAdmin(); renderPemorsian(); renderMobil(); }
        window.onload = fetchSchools;
    </script>
</body>
</html>
